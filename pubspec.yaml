name: orders_mobile
description: "Professional cafe management system - Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ?? UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  animations: ^2.0.11
  flutter_staggered_animations: ^1.1.1
  
  # ?? State Management & Navigation
  provider: ^6.1.1
  go_router: ^17.0.1
  
  # ?? Networking
  http: ^1.1.0
  dio: ^5.4.0
  
  # ?? Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  
  # ?? Forms & Validation
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0
  
  # ?? Utilities
  intl: ^0.20.2
  uuid: ^4.3.3
  equatable: ^2.0.5
  logger: ^2.0.2+1
  url_launcher: ^6.2.4
  
  # ?? Payment
  flutter_stripe: ^12.1.1
  
  # ?? Charts
  fl_chart: ^1.1.1
  
  # ??? Image
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
  


