org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Network configuration for resolving connectivity issues
# If you're behind a proxy, uncomment and configure these:
# systemProp.http.proxyHost=proxy.company.com
# systemProp.http.proxyPort=8080
# systemProp.http.proxyUser=username
# systemProp.http.proxyPassword=password
# systemProp.https.proxyHost=proxy.company.com
# systemProp.https.proxyPort=8080
# systemProp.https.proxyUser=username
# systemProp.https.proxyPassword=password

# Network timeouts (increase if you have slow connection)
systemProp.org.gradle.internal.http.connectionTimeout=120000
systemProp.org.gradle.internal.http.socketTimeout=120000

# Enable Gradle daemon for better performance
org.gradle.daemon=true

# Enable parallel builds
org.gradle.parallel=true